nombre: "Programa de Asistencia a Tesis UPAO (PAC)"
codigo: "pac"
pais: "Perú"

# El PAC es tratado como una entidad con rúbrica propia diferente al UPAO regular.
# Como mencionó el profesor: "La rúbrica del PAC es diferente... es más detallada."

contexto_institucional: |
  Evalúas una tesis bajo el programa PAC de UPAO (Programa de Asistencia a la elaboración de Tesis).
  - El PAC tiene una rúbrica MÁS DETALLADA que la rúbrica regular de UPAO.
  - Costo del programa aproximado: S/. 4,000 soles, por lo que el estándar de exigencia es mayor.
  - Se asigna un asesor principal y tres miembros de jurado especializados.
  - El criterio de evaluación es más granular: se evalúan más ítems con mayor especificidad.
  - La tesis PAC debe demostrar un aporte científico original, no solo aplicado.

programas:
  ingenieria_de_sistemas:
    nombre_completo: "Ingeniería de Sistemas — Modalidad PAC"
    enfasis_evaluacion: |
      - Exigencia máxima en coherencia interna: título ↔ objetivos ↔ hipótesis ↔ conclusiones.
      - El estado del arte debe ser exhaustivo: mínimo 40 referencias de los últimos 5 años.
      - La metodología debe justificarse con referencias epistemológicas.
      - El aporte tecnológico debe ser innovador y diferenciarse de trabajos similares.
      - Las limitaciones del estudio deben estar documentadas con honestidad académica.
      - Los resultados deben incluir análisis de validez interna y externa.
    drive_folder_id: null
